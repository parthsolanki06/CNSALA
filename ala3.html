<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMAC Authentication | Cyber Demo</title>
    <link rel="stylesheet" href="ala3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Prism Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <nav class="top-nav">
        <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Back to Home</a>
        <button class="nav-link code-btn" onclick="openCodeModal()"><i class="fas fa-code"></i> View Python Code</button>
        <a href="ala2.html" class="nav-link" style="margin-left: auto;"><i class="fas fa-chevron-left"></i> Back to ALA
            2</a>
    </nav>

    <div class="container">
        <header>
            <h1><i class="fas fa-shield-halved"></i> MAC-Based Auth</h1>
            <p class="subtitle">Secure Message Authentication using HMAC (SHA-256)</p>
        </header>

        <main class="demo-grid">
            <!-- SENDER SECTION -->
            <section class="card sender">
                <h2><i class="fas fa-paper-plane"></i> Sender Side</h2>

                <div class="input-group">
                    <label for="message-input">Message to Send</label>
                    <textarea id="message-input" rows="3" placeholder="Enter secret transmission..."></textarea>
                    <div id="msg-error" class="error-msg">Message cannot be empty</div>
                </div>

                <div class="input-group">
                    <label for="key-input">Secret Key (Symmetric)</label>
                    <input type="text" id="key-input" placeholder="Enter shared secret key">
                    <div id="key-error" class="error-msg">Secret key is required</div>
                </div>

                <button id="generate-btn" class="btn">
                    <span>Generate MAC</span>
                    <div class="loading" id="sender-loading"></div>
                </button>

                <div class="result-area" id="sender-result" style="display: none;">
                    <label>Generated MAC (HMAC-SHA256)</label>
                    <div id="generated-mac" class="mac-display"></div>
                </div>
            </section>

            <!-- RECEIVER SECTION -->
            <section class="card receiver">
                <h2><i class="fas fa-inbox"></i> Receiver Side</h2>

                <div class="input-group">
                    <label for="received-message">Received Message</label>
                    <textarea id="received-message" rows="3" placeholder="Waiting for message..."></textarea>
                </div>

                <div class="input-group">
                    <label for="verify-key">Verify Key</label>
                    <input type="text" id="verify-key" placeholder="Enter key to verify">
                </div>

                <button id="verify-btn" class="btn">
                    <span>Verify MAC</span>
                    <div class="loading" id="receiver-loading"></div>
                </button>

                <div class="result-area" id="receiver-result" style="display: none;">
                    <label>Verification Result</label>
                    <div id="verification-status" class="verification-status"></div>
                    <div id="verification-mac" class="mac-display" style="font-size: 0.7rem; margin-top: 5px;"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; CRYPTOGRAPHY AND NETWORK SECURITY | MAC-Based Message Authentication</p>
        </footer>
    </div>

    <div id="toast"
        style="position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--text-main); color: white; padding: 0.8rem 2rem; border-radius: 50px; font-weight: 700; display: none; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);">
        COPIED TO CLIPBOARD!</div>

    <!-- Code View Modal -->
    <div id="code-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fab fa-python"></i> ALA-3 Python Implementation</h3>
                <div class="modal-actions">
                    <button onclick="copyCode()" class="action-btn"><i class="far fa-copy"></i> Copy</button>
                    <button onclick="downloadCode()" class="action-btn"><i class="fas fa-download"></i> Download</button>
                    <button onclick="closeCodeModal()" class="close-btn">&times;</button>
                </div>
            </div>
            <div class="code-container">
                <pre class="line-numbers"><code class="language-python" id="python-code"></code></pre>
            </div>
        </div>
    </div>

    <!-- CryptoJS Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Prism JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

    <!-- Demo Script -->
    <script src="ala3.js"></script>
</body>

</html>
