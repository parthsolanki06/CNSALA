<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University ALA Portal | GMIU</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 50%, #d1d5db 100%);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0, transparent 50%);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--text-main);
            overflow: hidden; /* Default: no scrolling */
        }

        @media (max-width: 650px) {
            body {
                display: block; /* Stack naturally on mobile */
                height: auto;
                min-height: 100vh;
                padding: 1rem 0;
                overflow: auto; /* Allow scrolling on mobile */
            }
        }

        .dashboard {
            width: 95%;
            max-width: 850px;
            height: 90vh; /* Fixed height for dashboard */
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            padding: 1.5rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Spread items evenly */
            animation: fadeIn 0.8s ease-out;
            overflow: hidden; /* Strict no scrolling */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .logo-box {
            background: white;
            padding: 0.75rem;
            border-radius: 15px;
            display: inline-flex;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        .logo {
            height: 50px;
            object-fit: contain;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .badge-ala {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-block;
        }

        /* Student Info Section */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.6);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: var(--transition);
        }

        .info-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--primary);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05), inset -2px -2px 5px rgba(255,255,255,0.7);
        }

        .info-text {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .value {
            font-weight: 600;
            font-size: 1.15rem;
        }

        /* ALA Actions Section */
        .ala-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .ala-card {
            text-decoration: none;
            color: inherit;
            background: white;
            padding: 1.5rem 1rem;
            border-radius: 20px;
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .ala-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 25px;
            padding: 2px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.1;
            transition: var(--transition);
        }

        .ala-card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
        }

        .ala-card:hover::before {
            opacity: 1;
        }

        .ala-icon {
            width: 60px;
            height: 60px;
            background: #f8fafc;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            transition: var(--transition);
        }

        .ala-card:hover .ala-icon {
            background: var(--primary);
            color: white;
            transform: rotate(5deg);
        }

        .ala-name {
            font-size: 1.25rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
        }

        /* Footer */
        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 1rem;
        }

        footer strong {
            color: var(--text-main);
        }

        /* Responsive Breakpoints */
        @media (max-width: 850px) {
            .ala-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 650px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .dashboard {
                padding: 2rem 1.5rem;
                height: auto;
                max-height: none;
                overflow: visible;
                margin: 1rem 0;
            }
            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <div class="logo-box">
                <img src="gmiu.png" alt="University Logo" class="logo">
            </div>
            <h1>Gyanmanjari Innovative University</h1>
            <span class="badge-ala">Active Learning Activities</span>
        </header>

        <section class="info-grid">
            <!-- Name -->
            <div class="info-card">
                <div class="icon-circle">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div class="info-text">
                    <span class="label">Student Name</span>
                    <span class="value">Solanki Parth</span>
                </div>
            </div>

            <!-- Enrollment -->
            <div class="info-card">
                <div class="icon-circle">
                    <i class="fas fa-id-card"></i>
                </div>
                <div class="info-text">
                    <span class="label">Enrollment No</span>
                    <span class="value">20230905090038</span>
                </div>
            </div>

            <!-- Subject -->
            <div class="info-card">
                <div class="icon-circle">
                    <i class="fas fa-book-open"></i>
                </div>
                <div class="info-text">
                    <span class="label">Subject</span>
                    <span class="value" style="font-size: 1rem;">CRYPTOGRAPHY AND NETWORK SECURITY</span>
                </div>
            </div>

            <!-- Code -->
            <div class="info-card">
                <div class="icon-circle">
                    <i class="fas fa-code"></i>
                </div>
                <div class="info-text">
                    <span class="label">Subject Code</span>
                    <span class="value">BETIT16326</span>
                </div>
            </div>
        </section>

        <section class="ala-grid">
            <a href="ala1.html" class="ala-card" id="ala1-card">
                <div class="ala-icon"><i class="fas fa-file-signature"></i></div>
                <span class="ala-name">ALA-1</span>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Digital Signatures</p>
            </a>

            <a href="ala2.html" class="ala-card" id="ala2-card">
                <div class="ala-icon"><i class="fas fa-shield-virus"></i></div>
                <span class="ala-name">ALA-2</span>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Integrity Analyzer</p>
            </a>

            <a href="ala3.html" class="ala-card" id="ala3-card">
                <div class="ala-icon"><i class="fas fa-lock"></i></div>
                <span class="ala-name">ALA-3</span>
                <p style="font-size: 0.75rem; color: var(--text-muted);">HMAC Authentication</p>
            </a>
        </section>

        <footer>
            Designed by <strong>Parth Solanki</strong>
        </footer>
    </div>

    <script>
        // Subtle interaction: Card entrance stagger
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.info-card, .ala-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    card.style.transition = '0.5s cubic-bezier(0.22, 1, 0.36, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100 * index);
            });
        });
    </script>
</body>
</html>
